<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    /* top navigation bar */
    .navbar {
      background: #4f46e5;
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h1 {
      color: white;
      font-size: 20px;
    }

    .navbar button {
      background: white;
      color: #4f46e5;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    /* main content area */
    .container {
      padding: 30px;
    }

    .welcome {
      font-size: 22px;
      color: #333;
      margin-bottom: 24px;
    }

    /* stat cards at the top */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 10px;
      flex: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .stat-card h3 {
      color: #888;
      font-size: 13px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .stat-card p {
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }

    /* products table */
    .table-section {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .table-section h2 {
      margin-bottom: 16px;
      color: #333;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px;
      border-bottom: 2px solid #f0f2f5;
      color: #888;
      font-size: 13px;
      text-transform: uppercase;
    }

    td {
      padding: 12px 10px;
      border-bottom: 1px solid #f0f2f5;
      color: #444;
      font-size: 14px;
    }

    .no-data {
      text-align: center;
      color: #aaa;
      padding: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- navigation bar -->
  <div class="navbar">
    <h1>Inventory System</h1>
    <button onclick="logout()">Log out</button>
  </div>

  <div class="container">

    <!-- welcome message -->
    <p class="welcome" id="welcome-msg">Welcome back!</p>

    <!-- stat cards -->
    <div class="stats">
      <div class="stat-card">
        <h3>Total Products</h3>
        <p id="total-products">--</p>
      </div>
      <div class="stat-card">
        <h3>Total Stock</h3>
        <p id="total-stock">--</p>
      </div>
      <div class="stat-card">
        <h3>Logged in as</h3>
        <p id="user-role">--</p>
      </div>
    </div>

    <!-- products table -->
    <div class="table-section">
      <h2>Products</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Inventory Management</th>
          </tr>
        </thead>
        <tbody id="products-table">
          <tr>
            <td colspan="4" class="no-data">Loading products...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
  const token = localStorage.getItem('token')
  const user = JSON.parse(localStorage.getItem('user') || '{}')

  if (!token) {
    window.location.href = '/login'
  }

  document.getElementById('welcome-msg').textContent = `Welcome back, ${user.username}!`
  document.getElementById('user-role').textContent = user.role

  async function loadProducts() {
    try {
      const res = await fetch('/products', {
        headers: { Authorization: `Bearer ${token}` }
      })

      const data = await res.json()
      const products = data.data || []

      const totalStock = products.reduce((sum, p) => sum + p.stock, 0)
      document.getElementById('total-stock').textContent = totalStock

      document.getElementById('total-products').textContent = products.length

      const tbody = document.getElementById('products-table')

      if (!products.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="no-data">No products yet</td></tr>`
        return
      }

      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.name}</td>
          <td>$${p.price}</td>
          <td>${p.stock}</td>
          <td>
            <!-- INVENTORY CONTROLS -->
            <div style="margin-top:5px;">
              <button onclick="stockIn(${p.id})">+ In</button>
              <button onclick="stockOut(${p.id})">- Out</button>

              ${user.role === 'admin' ? `
                <button onclick="deleteProduct(${p.id})" style="color:red;">Delete</button>
              ` : ''}
            </div>
          </td>
        </tr>
      `).join('')

    } catch (err) {
      console.error(err)
    }
  }

  async function stockIn(productId) {
    const qty = prompt("Enter quantity to add:")
    if (!qty) return

    const res = await fetch(`/inventory/in/${productId}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ quantity: Number(qty) })
    })

    const data = await res.json()

    if (!res.ok) {
      alert(data.message)
      return
    }

    loadProducts()
  }

  async function stockOut(productId) {
    const qty = prompt("Enter quantity to remove:")
    if (!qty) return

    const res = await fetch(`/inventory/out/${productId}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ quantity: Number(qty) })
    })

    const data = await res.json()

    if (!res.ok) {
      alert(data.message)
      return
    }

    loadProducts()
  }

  async function deleteProduct(productId) {
    if (!confirm("Are you sure?")) return

    const res = await fetch(`/products/${productId}`, {
      method: 'DELETE',
      headers: {
        Authorization: `Bearer ${token}`
      }
    })

    const data = await res.json()

    if (!res.ok) {
      alert(data.message)
      return
    }

    loadProducts()
  }

  function logout() {
    localStorage.removeItem('token')
    localStorage.removeItem('user')
    window.location.href = '/login'
  }

  loadProducts()
</script>

</body>
</html>
